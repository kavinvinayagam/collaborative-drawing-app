trigger:
- main

variables:
  nodeVersion: '20.x'
  deployFolder: 'C:\Users\yamuv\OneDrive\Desktop\Test'

stages:

# ──────────────────────────────────────────
# STAGE 1 — BUILD CLIENT
# ──────────────────────────────────────────
- stage: BuildClient
  displayName: "CI — Build React Client"
  jobs:
  - job: ClientBuild
    displayName: "Build Frontend"
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # Debug — find exact folder structure
    - script: |
        echo "=== REPO ROOT ==="
        ls -la
        echo ""
        echo "=== ALL PACKAGE.JSON FILES ==="
        find . -name "package.json" -not -path "*/node_modules/*"
      displayName: "Debug — Show Structure"

    - task: NodeTool@0
      displayName: "Install Node.js"
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd client
        npm install
      displayName: "Install Client Packages"

    - script: |
        cd client
        npm run build
      displayName: "Build React App"

    - task: CopyFiles@2
      displayName: "Copy Client Build"
      inputs:
        SourceFolder: 'client/build'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/client'

    - task: PublishBuildArtifacts@1
      displayName: "Upload Client Artifact"
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/client'
        ArtifactName: 'client-drop'

# ──────────────────────────────────────────
# STAGE 2 — BUILD SERVER
# ──────────────────────────────────────────
- stage: BuildServer
  displayName: "CI — Build Node.js Server"
  dependsOn: []
  jobs:
  - job: ServerBuild
    displayName: "Build Backend"
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    - task: NodeTool@0
      displayName: "Install Node.js"
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd server
        npm install
      displayName: "Install Server Packages"

    - task: CopyFiles@2
      displayName: "Package Server Files"
      inputs:
        SourceFolder: 'server'
        Contents: |
          **
          !node_modules/**
          !**/*.test.js
        TargetFolder: '$(Build.ArtifactStagingDirectory)/server'

    - task: PublishBuildArtifacts@1
      displayName: "Upload Server Artifact"
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/server'
        ArtifactName: 'server-drop'

# ──────────────────────────────────────────
# STAGE 3 — DEPLOY
# ──────────────────────────────────────────
- stage: Deploy
  displayName: "CD — Deploy to Local PC"
  dependsOn:
  - BuildClient
  - BuildServer
  condition: |
    and
    (
      succeeded('BuildClient'),
      succeeded('BuildServer')
    )

  jobs:
  - job: DeployJob
    pool:
      name: Default                  # your self-hosted agent

    steps:

    - task: DownloadBuildArtifacts@1
      displayName: "Download Client Build"
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'client-drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: DownloadBuildArtifacts@1
      displayName: "Download Server Build"
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'server-drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: CopyFiles@2
      displayName: "Deploy Client"
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)\client-drop'
        Contents: '**'
        TargetFolder: '$(deployFolder)\client'
        CleanTargetFolder: true

    - task: CopyFiles@2
      displayName: "Deploy Server"
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)\server-drop'
        Contents: '**'
        TargetFolder: '$(deployFolder)\server'
        CleanTargetFolder: true

    - script: npm install --production
      displayName: "Install Production Packages"
      workingDirectory: '$(deployFolder)\server'

    - script: echo ✅ Deployment Complete!
      displayName: "Done"

