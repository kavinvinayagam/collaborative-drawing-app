
trigger:
- main

variables:
  nodeVersion: '20.x'
  deployFolder: 'C:\Users\yamuv\OneDrive\Desktop\Test'

stages:

# ──────────────────────────────────────────────
# STAGE 1 — BUILD SERVER (Node.js)
# server/ has package.json + server.js
# ──────────────────────────────────────────────
- stage: BuildServer
  displayName: "CI — Build Node.js Server"
  jobs:
  - job: ServerBuild
    displayName: "Install and Package Server"
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # 1. Install Node.js
    - task: NodeTool@0
      displayName: "Install Node.js"
      inputs:
        versionSpec: '$(nodeVersion)'

    # 2. Install server dependencies
    #    server/ has package-lock.json so npm ci works
    - script: npm ci
      displayName: "Install Server Packages"
      workingDirectory: 'server'

    # 3. Package server files for deployment
    #    Exclude node_modules (will reinstall on deploy)
    - task: CopyFiles@2
      displayName: "Package Server Files"
      inputs:
        SourceFolder: 'server'
        Contents: |
          server.js
          package.json
          package-lock.json
        TargetFolder: '$(Build.ArtifactStagingDirectory)/server'

    # 4. Package client HTML file
    - task: CopyFiles@2
      displayName: "Package Client HTML"
      inputs:
        SourceFolder: 'client'
        Contents: 'index.html'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/client'

    # 5. Upload everything as one artifact
    - task: PublishBuildArtifacts@1
      displayName: "Upload Artifact"
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'app-drop'

# ──────────────────────────────────────────────
# STAGE 2 — DEPLOY to Local Windows PC
# ──────────────────────────────────────────────
- stage: Deploy
  displayName: "CD — Deploy to Local PC"
  dependsOn: BuildServer
  condition: succeeded()

  jobs:
  - job: DeployJob
    displayName: "Deploy App to Desktop"
    pool:
      name: Default               # your self-hosted local agent

    steps:

    # 1. Download built artifact
    - task: DownloadBuildArtifacts@1
      displayName: "Download Artifact"
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'app-drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    # 2. Deploy server files to local folder
    - task: CopyFiles@2
      displayName: "Deploy Server"
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)\app-drop\server'
        Contents: '**'
        TargetFolder: '$(deployFolder)\server'
        CleanTargetFolder: true

    # 3. Deploy client HTML to local folder
    - task: CopyFiles@2
      displayName: "Deploy Client HTML"
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)\app-drop\client'
        Contents: 'index.html'
        TargetFolder: '$(deployFolder)\client'
        CleanTargetFolder: true

    # 4. Install production packages on deployed server
    - script: npm install --production
      displayName: "Install Production Packages"
      workingDirectory: '$(deployFolder)\server'

    # 5. Confirm deployment
    - script: |
        echo ✅ Server deployed to $(deployFolder)\server
        echo ✅ Client deployed to $(deployFolder)\client
        echo 🚀 Deployment Complete!
      displayName: "Deployment Done"
